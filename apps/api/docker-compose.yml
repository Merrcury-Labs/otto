name: otto

services:
  db:
    image: postgres:16-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: ${POSTGRES_ADMIN_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:?POSTGRES_ADMIN_PASSWORD must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - backend

  api:
    build:
      context: .
      target: runtime
    image: otto-api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    init: true
    ports:
      - "${API_BIND_ADDRESS:-127.0.0.1}:${API_PORT:-8000}:8000"
    environment:
      DJANGO_DEBUG: "False"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?DJANGO_SECRET_KEY must be set}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:?DJANGO_ALLOWED_HOSTS must be set}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
      POSTGRES_DB: ${POSTGRES_DB:-otto_lms}
      POSTGRES_USER: ${POSTGRES_USER:-otto_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_ADMIN_DB: postgres
      POSTGRES_ADMIN_USER: ${POSTGRES_ADMIN_USER:-postgres}
      POSTGRES_ADMIN_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:?POSTGRES_ADMIN_PASSWORD must be set}
      POSTGRES_CONNECT_RETRIES: ${POSTGRES_CONNECT_RETRIES:-60}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/', timeout=3)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - backend

  collab:
    build:
      context: ../../
      dockerfile: apps/collab-server/Dockerfile
    image: otto-collab:${IMAGE_TAG:-latest}
    restart: unless-stopped
    init: true
    ports:
      - "${COLLAB_BIND_ADDRESS:-127.0.0.1}:${COLLAB_PORT:-1234}:1234"
    environment:
      COLLAB_SECRET: ${COLLAB_SECRET:?COLLAB_SECRET must be set}
      COLLAB_PORT: "1234"
      # Keep this explicit so reserved characters in credentials are URL-encoded.
      DATABASE_URL: ${COLLAB_DATABASE_URL:?COLLAB_DATABASE_URL must be set}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - backend

volumes:
  postgres_data:

networks:
  backend:
    driver: bridge
