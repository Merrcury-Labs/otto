services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0}
      # Database — connects to Postgres running outside Docker
      POSTGRES_DB: ${POSTGRES_DB:-otto_lms}
      POSTGRES_USER: ${POSTGRES_USER:-otto_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-otto_password}
      POSTGRES_HOST: ${POSTGRES_HOST:-host.docker.internal}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      # Admin credentials used by init-db.sh to create the user/database
      POSTGRES_ADMIN_USER: ${POSTGRES_ADMIN_USER:-postgres}
      POSTGRES_ADMIN_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  collab:
    build:
      context: ../../
      dockerfile: apps/collab-server/Dockerfile
    ports:
      - "1234:1234"
    environment:
      COLLAB_SECRET: ${COLLAB_SECRET:-dev-secret-change-me}
      COLLAB_PORT: "1234"
      DATABASE_URL: postgres://${POSTGRES_USER:-otto_user}:${POSTGRES_PASSWORD:-otto_password}@${POSTGRES_HOST:-host.docker.internal}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-otto_lms}
    extra_hosts:
      - "host.docker.internal:host-gateway"
