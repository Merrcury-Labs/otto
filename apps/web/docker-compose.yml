services:
  web:
    build:
      context: ../../
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      # Better Auth
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-ed9FXl4wsikzcD12hlcJAhbSpG1cXTh7}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      # Database — connects to Postgres running outside Docker
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-otto_admin}
      DB_PASSWORD: ${DB_PASSWORD:-8390dfjdkHjh737}
      DB_NAME: ${DB_NAME:-otto}
      # Public URLs
      NEXT_PUBLIC_DASHBOARD_URL: ${NEXT_PUBLIC_DASHBOARD_URL:-http://localhost:3002}
      NEXT_PUBLIC_WEB_URL: ${NEXT_PUBLIC_WEB_URL:-http://localhost:3000}
      # Backend
      SERVER_URL: ${SERVER_URL:-http://host.docker.internal:8000}
      # AI
      AI_BASE_URL: ${AI_BASE_URL:-}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-glm-5.2}
      AI_PROVIDER: ${AI_PROVIDER:-zai}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      # Cloudflare R2
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-otto-lms-users}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
